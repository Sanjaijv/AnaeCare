name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths-ignore:
      - 'backend/**'
  pull_request:
    branches: [ "main" ]
    paths-ignore:
      - 'backend/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: TypeScript check
      run: npx tsc --noEmit
      
    - name: Run Jest tests
      run: npm run test --if-present
