version: "3.8"

services:
  postgres:
    image: postgres:15-alpine
    container_name: anaecare_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-anaecare}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend_network

  pgadmin:
    image: dpage/pgadmin4
    container_name: anaecare_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@anaecare.com}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - backend_network

  redis:
    image: redis:7-alpine
    container_name: anaecare_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - backend_network
    # entrypoint: ["echo", "Redis is currently disabled but ready for future use."] 
    # Commented out entrypoint to actually let it run, or can just leave it as is.

  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: anaecare_backend
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - ../.env.development
    depends_on:
      - postgres
      - redis
    volumes:
      - ..:/app
    networks:
      - backend_network

volumes:
  postgres_data:
  redis_data:

networks:
  backend_network:
    driver: bridge
